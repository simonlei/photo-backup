name: photo_backup_app
description: Privacy-first photo backup to NAS and cloud storage
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.2
  
  # Navigation
  go_router: ^13.0.0
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # Photo Access
  image_picker: ^1.0.5
  photo_manager: ^3.0.0
  
  # Permissions
  permission_handler: ^11.1.0
  
  # Networking
  http: ^1.1.2
  dio: ^5.4.0
  
  # Concurrency
  synchronized: ^3.1.0
  
  # Utilities
  intl: ^0.18.1
  logging: ^1.2.0
  uuid: ^4.2.2
  
  # UI Components
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  lottie: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  bloc_test: ^9.1.5
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/rclone/
